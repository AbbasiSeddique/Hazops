steps:
  # Build backend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/hazop-backend:$COMMIT_SHA"
      - "-f"
      - "infrastructure/Dockerfile.backend"
      - "."
    id: "build-backend"

  # Build frontend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/hazop-frontend:$COMMIT_SHA"
      - "-f"
      - "infrastructure/Dockerfile.frontend"
      - "."
    id: "build-frontend"

  # Push backend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hazop-backend:$COMMIT_SHA"
    id: "push-backend"
    waitFor:
      - "build-backend"

  # Push frontend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hazop-frontend:$COMMIT_SHA"
    id: "push-frontend"
    waitFor:
      - "build-frontend"

  # Deploy backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "hazop-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/hazop-backend:$COMMIT_SHA"
      - "--region"
      - "$_REGION"
      - "--platform"
      - "managed"
      - "--port"
      - "8000"
      - "--allow-unauthenticated"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
    id: "deploy-backend"
    waitFor:
      - "push-backend"

  # Deploy frontend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "hazop-frontend"
      - "--image"
      - "gcr.io/$PROJECT_ID/hazop-frontend:$COMMIT_SHA"
      - "--region"
      - "$_REGION"
      - "--platform"
      - "managed"
      - "--port"
      - "8080"
      - "--allow-unauthenticated"
      - "--memory"
      - "256Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
    id: "deploy-frontend"
    waitFor:
      - "push-frontend"
      - "deploy-backend"

substitutions:
  _REGION: us-central1

images:
  - "gcr.io/$PROJECT_ID/hazop-backend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/hazop-frontend:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
