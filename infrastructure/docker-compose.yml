version: "3.9"

services:
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - hazop-network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    networks:
      - hazop-network
    restart: unless-stopped

networks:
  hazop-network:
    driver: bridge
